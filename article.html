<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="虎桃不会振刀的江湖随笔。" />
    <meta property="og:type" content="article" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="alternate" type="application/rss+xml" title="虎桃不会振刀 RSS" href="./rss.xml" />
    <title>文章 | 虎桃不会振刀</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Long+Cang&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./article-pages.css" />
  </head>
  <body class="inner-page">
    <div class="reading-progress" id="readingProgress" aria-hidden="true"></div>
    <div class="paper-noise" aria-hidden="true"></div>
    <header class="site-header scrolled">
      <a class="brand" href="./index.html"><span class="brand-seal">虎桃</span><span class="brand-name">不会振刀</span></a>
      <nav class="inner-nav"><a href="./index.html">首页</a><a href="./articles.html">全部文章</a></nav>
    </header>
    <main class="article-detail-shell">
      <article id="articleDetail" aria-live="polite"><p class="article-state">正在展开此卷……</p></article>
      <aside class="article-toc" id="articleToc" hidden aria-label="文章目录"></aside>
      <section class="article-actions" id="articleActions" hidden>
        <button type="button" data-reaction="like">赞 <span>0</span></button>
        <button type="button" data-reaction="favorite">收藏 <span>0</span></button>
        <button type="button" id="shareArticle">分享此卷</button>
        <span id="viewCount"></span>
      </section>
      <nav class="article-neighbors" id="articleNeighbors" hidden aria-label="相邻文章"></nav>
      <section class="related-articles" id="relatedArticles" hidden>
        <p class="eyebrow">Related Notes</p>
        <h2>同卷相逢</h2>
        <div></div>
      </section>
      <section class="comment-section" id="comments" hidden>
        <div class="comment-heading">
          <p class="eyebrow">Comments</p>
          <h2>卷后留评</h2>
          <p>所有访客都可以评论，也可以附上一份文件。</p>
        </div>
        <form class="comment-form" id="commentForm">
          <input type="hidden" name="parentId" />
          <p class="reply-context" id="replyContext" hidden></p>
          <label><span>江湖名号</span><input type="text" name="visitorName" maxlength="40" required /></label>
          <label><span>评论</span><textarea name="body" rows="4" maxlength="2000" required></textarea></label>
          <label><span>文件</span><input type="file" name="attachments" accept="image/png,image/jpeg,image/gif,image/webp,text/plain,application/pdf" multiple /><small>最多 3 个；仅图片、TXT、PDF；单个不超过 5 MB。</small></label>
          <button class="ink-button" type="submit">留下评论</button>
          <p class="comment-status" id="commentStatus" role="status"></p>
        </form>
        <div class="comment-list" id="commentList" aria-live="polite"></div>
      </section>
    </main>
    <footer><p>© 2026 虎桃不会振刀</p><a href="./articles.html">返回文章页</a></footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./article-service.js"></script>
    <script src="./markdown.js"></script>
    <script src="./theme.js"></script>
    <script src="./article-detail.js"></script>
  </body>
</html>
